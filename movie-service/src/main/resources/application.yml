server:
  port: 8082

spring:
  application:
    name: movie-service

  # ── Database ───────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/cinebook_movies
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update          # use 'validate' + Flyway in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Jackson - serialize LocalDateTime as ISO-8601 strings
  jackson:
    serialization:
      write-dates-as-timestamps: false

# ── Eureka ─────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, env, loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true

  # ── Prometheus / Micrometer ───────────────────────────────────────────────
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

  # ── Distributed Tracing (Micrometer Tracing + Brave + Zipkin) ─────────────
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# ── Info endpoint ──────────────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: "CineBook Movie Service"

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.cinebook.movie: DEBUG
