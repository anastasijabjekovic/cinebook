server:
  port: 8081

spring:
  application:
    name: user-service

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/cinebook_users
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update          # use 'validate' + Flyway in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

# ── Eureka ─────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics, env, loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true

  # ── Prometheus / Micrometer ───────────────────────────────────────────────
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}   # label on every metric
    distribution:
      percentiles-histogram:
        http.server.requests: true               # histograms for latency buckets

  # ── Distributed Tracing (Micrometer Tracing + Brave + Zipkin) ─────────────
  tracing:
    sampling:
      probability: 1.0           # 100 % in dev; lower to 0.1 in prod
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# ── Info endpoint ──────────────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: "CineBook User Service"

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  pattern:
    # include traceId / spanId injected by Micrometer Tracing
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.cinebook.user: DEBUG
